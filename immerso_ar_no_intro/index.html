<!DOCTYPE html>
<html lang="en-us">
<head>
  <meta charset="utf-8">
  <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
  <meta name="viewport" content="width=device-width, height=device-height, initial-scale=1.0, user-scalable=no, viewport-fit=cover">

  <title>AHKEvent</title>

  <link rel="shortcut icon" href="TemplateData/favicon.ico">
  <link rel="stylesheet" href="TemplateData/style.css">

  <link rel="preload" as="image" href="TemplateData/splash.png" fetchpriority="high">
  <link rel="preload" as="image" href="TemplateData/Logo.png" fetchpriority="high">
  <link rel="preload" as="image" href="TemplateData/back-button.png" fetchpriority="high">

  <script defer src="TemplateData/webview-back-button.js"></script>

  <!-- MICROPHONE PRO START: keep this only if microphone.js exists beside index.html after build -->
  <script src="./microphone.js"></script>
  <!-- MICROPHONE PRO END -->
</head>

<body>
  <button id="webview-back-button" type="button" aria-label="Back to Gameplay">
    <img src="TemplateData/back-button.png" alt="Back">
  </button>

  <div id="unity-container">
    <canvas id="unity-canvas" tabindex="-1"></canvas>

    <div id="unity-loading-bar">
      <div id="unity-loading-content">
        <div id="unity-logo" aria-label="Logo"></div>
        <div id="unity-progress-bar-empty">
          <div id="unity-progress-bar-full"></div>
        </div>
        <div id="unity-loading-text">Loading...</div>
      </div>
    </div>

    <div id="unity-warning"></div>
  </div>

  <script>
    const container = document.querySelector("#unity-container");
    const canvas = document.querySelector("#unity-canvas");
    const loadingBar = document.querySelector("#unity-loading-bar");
    const progressBarFull = document.querySelector("#unity-progress-bar-full");
    const warningBanner = document.querySelector("#unity-warning");

    function unityShowBanner(msg, type) {
      function updateBannerVisibility() {
        warningBanner.style.display = warningBanner.children.length ? "block" : "none";
      }

      const div = document.createElement("div");
      div.innerHTML = msg;
      div.className = type === "error" ? "unity-banner-error" : "unity-banner-warning";
      warningBanner.appendChild(div);

      if (type !== "error") {
        setTimeout(function () {
          if (warningBanner.contains(div)) warningBanner.removeChild(div);
          updateBannerVisibility();
        }, 5000);
      }

      updateBannerVisibility();
    }

    const buildUrl = "Build";
    const loaderUrl = buildUrl + "/Build.loader.js";

    const config = {
      dataUrl: buildUrl + "/Build.data",
      frameworkUrl: buildUrl + "/Build.framework.js",
      codeUrl: buildUrl + "/Build.wasm",
      streamingAssetsUrl: "StreamingAssets",
      companyName: "DefaultCompany",
      productName: "AHKEvent",
      productVersion: "0.1.0",
      showBanner: unityShowBanner,
    };

    function resizeUnityCanvas() {
      canvas.style.width = "100vw";
      canvas.style.height = "100vh";
      canvas.width = window.innerWidth * window.devicePixelRatio;
      canvas.height = window.innerHeight * window.devicePixelRatio;
    }

    window.addEventListener("resize", resizeUnityCanvas);
    window.addEventListener("orientationchange", function () {
      setTimeout(resizeUnityCanvas, 300);
    });
    resizeUnityCanvas();

    loadingBar.style.display = "flex";

    function preloadImage(src) {
      return new Promise(function (resolve) {
        const img = new Image();
        img.onload = function () { resolve(true); };
        img.onerror = function () { console.warn("Could not preload image:", src); resolve(false); };
        img.decoding = "async";
        if ("fetchPriority" in img) img.fetchPriority = "high";
        img.src = src;
      });
    }

    function wait(ms) {
      return new Promise(function (resolve) { setTimeout(resolve, ms); });
    }

    async function startUnity() {
      await Promise.race([
        Promise.all([
          preloadImage("TemplateData/splash.png"),
          preloadImage("TemplateData/Logo.png"),
          preloadImage("TemplateData/back-button.png")
        ]),
        wait(2000)
      ]);

      const script = document.createElement("script");
      script.src = loaderUrl;

      script.onload = function () {
        createUnityInstance(canvas, config, function (progress) {
          progressBarFull.style.width = (100 * progress) + "%";
        }).then(function (unityInstance) {
          window.unityInstance = unityInstance;

          if (window.WebViewBackButton) {
            window.WebViewBackButton.setUnityInstance(unityInstance);
          }

          loadingBar.style.display = "none";
        }).catch(function (message) {
          alert(message);
        });
      };

      document.body.appendChild(script);
    }

    startUnity();
  </script>
</body>
</html>
