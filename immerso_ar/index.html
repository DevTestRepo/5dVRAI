<!DOCTYPE html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>Unity Web Player | AHKEvent</title>

    <link rel="shortcut icon" href="TemplateData/favicon.ico">

    <!-- Loading screen images -->
    <link rel="preload" as="image" href="TemplateData/splash.png" fetchpriority="high">
    <link rel="preload" as="image" href="TemplateData/Logo.png" fetchpriority="high">

    <!-- Vuplex WebView HTML back button image -->
    <link rel="preload" as="image" href="TemplateData/back-button.png" fetchpriority="high">

    <link rel="stylesheet" href="TemplateData/style.css">
    <link rel="manifest" href="manifest.webmanifest">

    <!-- Vuplex WebView HTML back button JS -->
    <script defer src="TemplateData/webview-back-button.js"></script>

    <style>
      html,
      body {
        padding: 0;
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #000;
      }

      #unity-container {
        position: fixed;
        inset: 0;
        width: 100vw;
        height: 100vh;
        background: #000;
        overflow: hidden;
      }

      #unity-canvas {
        width: 100vw;
        height: 100vh;
        display: block;
        background: #000;
      }

      #unity-loading-bar {
        position: fixed;
        inset: 0;
        width: 100vw;
        height: 100vh;

        display: none;
        align-items: center;
        justify-content: center;

        z-index: 9999;
        overflow: hidden;

        background:
          radial-gradient(
            circle at center 58%,
            rgba(255, 0, 128, 0.22),
            rgba(0, 0, 0, 0.15) 34%,
            rgba(0, 0, 0, 0.68) 74%
          ),
          url("TemplateData/splash.png") center center / cover no-repeat,
          #000;
      }

      #unity-loading-bar::before {
        content: "";
        position: absolute;
        inset: 0;
        background: linear-gradient(
          to bottom,
          rgba(0, 0, 0, 0.22),
          rgba(0, 0, 0, 0.04) 45%,
          rgba(0, 0, 0, 0.30)
        );
        pointer-events: none;
      }

      #unity-loading-content {
        position: relative;
        z-index: 1;

        width: min(76vw, 330px);

        display: flex;
        flex-direction: column;
        align-items: center;

        transform: translateY(-1.8vh);
      }

      #unity-logo {
        width: min(72vw, 305px);
        aspect-ratio: 746 / 839;

        background: url("TemplateData/Logo.png") center center / contain no-repeat;

        filter:
          drop-shadow(0 0 10px rgba(255, 255, 255, 0.50))
          drop-shadow(0 0 28px rgba(255, 0, 145, 0.95));
      }

      #unity-progress-bar-empty {
        width: min(70vw, 276px);
        height: 10px;
        margin-top: 16px;

        border-radius: 999px;
        overflow: hidden;

        background: rgba(255, 255, 255, 0.95);

        box-shadow:
          0 0 8px rgba(255, 255, 255, 0.76),
          0 0 22px rgba(255, 0, 145, 0.72);
      }

      #unity-progress-bar-full {
        width: 0%;
        height: 100%;

        border-radius: 999px;

        background: linear-gradient(
          90deg,
          #ff1a9b 0%,
          #ff4eb6 55%,
          #ffffff 100%
        );

        box-shadow: 0 0 16px rgba(255, 0, 145, 0.95);

        transition: width 0.18s ease-out;
      }

      #unity-loading-text {
        margin-top: 13px;

        color: #fff;

        font-family: Arial, Helvetica, sans-serif;
        font-size: 17px;
        font-weight: 800;
        letter-spacing: 0.1px;

        text-shadow:
          0 0 8px rgba(255, 255, 255, 0.58),
          0 0 16px rgba(255, 0, 145, 0.72);
      }

      #unity-warning {
        position: fixed;
        left: 50%;
        top: 5%;
        transform: translateX(-50%);
        z-index: 10000;

        background: white;
        padding: 10px;

        display: none;

        font-family: Arial, Helvetica, sans-serif;
      }

      #webview-back-button {
        position: fixed;

        left: calc(env(safe-area-inset-left, 0px) + 18px);
        top: calc(env(safe-area-inset-top, 0px) + 18px);

        width: 64px;
        height: 64px;

        padding: 0;
        margin: 0;
        border: none;
        outline: none;

        background: transparent;
        cursor: pointer;

        z-index: 2147483647;

        display: none;

        -webkit-tap-highlight-color: transparent;
        touch-action: manipulation;
      }

      #webview-back-button img {
        width: 100%;
        height: 100%;
        display: block;
        pointer-events: none;
        user-select: none;
        -webkit-user-drag: none;
      }

      #webview-back-button:active {
        transform: scale(0.94);
      }

      @media (max-width: 480px) {
        #webview-back-button {
          width: 58px;
          height: 58px;
          left: calc(env(safe-area-inset-left, 0px) + 14px);
          top: calc(env(safe-area-inset-top, 0px) + 14px);
        }
      }

      @media (max-height: 720px) {
        #unity-loading-content {
          width: min(70vw, 295px);
          transform: translateY(-0.5vh);
        }

        #unity-logo {
          width: min(62vw, 260px);
        }

        #unity-progress-bar-empty {
          width: min(66vw, 250px);
          margin-top: 10px;
        }

        #unity-loading-text {
          margin-top: 10px;
          font-size: 15px;
        }
      }
    </style>
  </head>

  <body>
    <!-- HTML overlay back button above Vuplex WebGL 2D WebView -->
    <button id="webview-back-button" type="button" aria-label="Back to Gameplay">
      <img src="TemplateData/back-button.png" alt="Back">
    </button>

    <div id="unity-container">
      <canvas id="unity-canvas" width="960" height="600" tabindex="-1"></canvas>

      <div id="unity-loading-bar">
        <div id="unity-loading-content">
          <div id="unity-logo"></div>

          <div id="unity-progress-bar-empty">
            <div id="unity-progress-bar-full"></div>
          </div>

          <div id="unity-loading-text">Loading...</div>
        </div>
      </div>

      <div id="unity-warning"> </div>
    </div>

    <script>
      window.addEventListener("load", function () {
        if ("serviceWorker" in navigator) {
          navigator.serviceWorker.register("ServiceWorker.js");
        }
      });

      var container = document.querySelector("#unity-container");
      var canvas = document.querySelector("#unity-canvas");
      var loadingBar = document.querySelector("#unity-loading-bar");
      var progressBarFull = document.querySelector("#unity-progress-bar-full");
      var warningBanner = document.querySelector("#unity-warning");

      function unityShowBanner(msg, type) {
        function updateBannerVisibility() {
          warningBanner.style.display = warningBanner.children.length ? "block" : "none";
        }

        var div = document.createElement("div");
        div.innerHTML = msg;
        warningBanner.appendChild(div);

        if (type == "error") {
          div.style = "background: red; padding: 10px;";
        } else {
          if (type == "warning") {
            div.style = "background: yellow; padding: 10px;";
          }

          setTimeout(function () {
            if (warningBanner.contains(div)) {
              warningBanner.removeChild(div);
            }

            updateBannerVisibility();
          }, 5000);
        }

        updateBannerVisibility();
      }

      var buildUrl = "Build";
      var loaderUrl = buildUrl + "/Build.loader.js";

      var config = {
        arguments: [],
        dataUrl: buildUrl + "/Build.data",
        frameworkUrl: buildUrl + "/Build.framework.js",
        codeUrl: buildUrl + "/Build.wasm",
        streamingAssetsUrl: "StreamingAssets",
        companyName: "DefaultCompany",
        productName: "AHKEvent",
        productVersion: "0.1.0",
        showBanner: unityShowBanner,
        // errorHandler: function(err, url, line) {
        //    alert("error " + err + " occurred at line " + line);
        //    // Return 'true' if you handled this error and don't want Unity
        //    // to process it further, 'false' otherwise.
        //    return true;
        // },
      };

      if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
        var meta = document.createElement("meta");
        meta.name = "viewport";
        meta.content = "width=device-width, height=device-height, initial-scale=1.0, user-scalable=no, shrink-to-fit=yes";
        document.getElementsByTagName("head")[0].appendChild(meta);
      } else {
        var meta = document.createElement("meta");
        meta.name = "viewport";
        meta.content = "width=device-width, height=device-height, initial-scale=1.0, user-scalable=no, shrink-to-fit=yes";
        document.getElementsByTagName("head")[0].appendChild(meta);
      }

      loadingBar.style.display = "flex";

      function preloadImage(src) {
        return new Promise(function (resolve) {
          var img = new Image();

          img.onload = function () {
            resolve(true);
          };

          img.onerror = function () {
            console.warn("Could not preload image:", src);
            resolve(false);
          };

          img.decoding = "async";

          if ("fetchPriority" in img) {
            img.fetchPriority = "high";
          }

          img.src = src;
        });
      }

      function wait(ms) {
        return new Promise(function (resolve) {
          setTimeout(resolve, ms);
        });
      }

      async function startUnityAfterLoadingImages() {
        await Promise.race([
          Promise.all([
            preloadImage("TemplateData/splash.png"),
            preloadImage("TemplateData/Logo.png"),
            preloadImage("TemplateData/back-button.png")
          ]),
          wait(2000)
        ]);

        var script = document.createElement("script");
        script.src = loaderUrl;

        script.onload = function () {
          createUnityInstance(canvas, config, function (progress) {
            progressBarFull.style.width = 100 * progress + "%";
          }).then(function (unityInstance) {
            window.unityInstance = unityInstance;

            if (window.WebViewBackButton) {
              window.WebViewBackButton.setUnityInstance(unityInstance);
            }

            loadingBar.style.display = "none";
          }).catch(function (message) {
            alert(message);
          });
        };

        document.body.appendChild(script);
      }

      startUnityAfterLoadingImages();
    </script>
  </body>
</html>
