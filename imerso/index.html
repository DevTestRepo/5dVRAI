<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />

  <!-- Title Name -->
  <title>Magrabi AI</title>

  <link rel="icon" href="./icons/favIcon.ico" type="image/x-icon">
  <link rel="shortcut icon" href="./icons/favIcon.ico" type="image/x-icon">


  <link rel="stylesheet" href="styles.css" />

  <!-- PDF.js library -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script>
    // Set worker path relative to the CDN
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
  </script>
  <script src="pdf-manager.js"></script>
  <!-- End PDF.js library -->

</head>

<body>

  <!-- Unity -->
  <div id="unity-wrap">
    <div id="unity-stage">
      <canvas id="unity-canvas" tabindex="-1"></canvas>
    </div>

    <div id="unity-loading">
      <div id="unity-progress">
        <div id="unity-progress-bar"></div>
      </div>
      <div id="unity-status">Loading…</div>
    </div>
  </div>

  <!-- UI injected from ui.html -->
  <div id="ui-root"></div>

  <script src="bridge.js"></script>
  <script src="aihub-webgl-app.js"></script>

  <!-- PDF Viewer Overlay -->
  <div id="pdf-overlay" class="pdf-hidden">
    <div class="pdf-toolbar">
      <div class="pdf-title" id="pdf-filename">Document Viewer</div>
      <div class="pdf-controls">
        <button onclick="PDFViewer.download()" title="Download PDF">⬇</button>
        <button onclick="PDFViewer.zoom(-0.2)">−</button>
        <button onclick="PDFViewer.zoom(0.2)">+</button>
        <button class="pdf-close-btn" onclick="PDFViewer.close()">✕</button>
      </div>
    </div>
    <div id="pdf-scroll-container">
      <canvas id="pdf-canvas"></canvas>
    </div>
  </div>
  <!-- End PDF Viewer Overlay -->

</body>

</html>
